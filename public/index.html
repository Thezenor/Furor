<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10031c" />
    <title>Furor Live · Público</title>
    <style>
      :root { --bg:#10031c; --cyan:#1fd6e8; --pink:#ff2e9a; --violet:#9d4edd; --ok:#2bf0a0; --err:#ff7ba6; }
      * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      html,body { margin:0; }
      body {
        min-height:100dvh; background:var(--bg); color:#eee;
        font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
        padding:16px max(16px,env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));
      }
      .wrap { width:100%; max-width:520px; margin:0 auto; }
      h1 { color:var(--cyan); text-shadow:0 0 14px var(--cyan); font-size:clamp(26px,7vw,34px); margin:.3em 0 .1em; text-align:center; }
      .muted { color:#a98cc4; text-align:center; font-size:14px; }
      .badge { display:inline-block; padding:3px 12px; border-radius:999px; font-size:12px; font-weight:600; }
      .on { background:rgba(43,240,160,.2); color:var(--ok); } .off { background:rgba(255,59,107,.2); color:#ff9bb3; }
      .card { background:rgba(255,255,255,.04); border:1px solid rgba(157,78,221,.35); border-radius:18px; padding:18px; margin-top:16px; }
      .title { font-size:clamp(20px,5.5vw,26px); color:var(--cyan); margin:0 0 12px; text-align:center; }
      button { font-family:inherit; cursor:pointer; }
      button:active { transform:scale(.98); }
      .opt { display:block; width:100%; padding:20px; margin:10px 0; font-size:clamp(18px,5vw,22px); border-radius:16px; border:1px solid var(--violet); background:rgba(157,78,221,.14); color:#fff; }
      .scores { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
      .scores button { padding:20px 0; font-size:clamp(20px,6vw,28px); border-radius:16px; border:1px solid var(--cyan); background:rgba(31,214,232,.12); color:#fff; }
      .energy { width:min(62vw,230px); aspect-ratio:1; border-radius:50%; border:5px solid var(--cyan); background:rgba(31,214,232,.08); color:var(--cyan); font-size:clamp(22px,6vw,28px); text-transform:uppercase; font-weight:700; display:block; margin:6px auto; box-shadow:0 0 28px rgba(31,214,232,.5); }
      .thanks { color:var(--cyan); font-size:clamp(20px,5vw,24px); text-align:center; }
      input[type=text] { width:100%; padding:14px; border-radius:12px; border:1px solid rgba(157,78,221,.5); background:rgba(0,0,0,.35); color:var(--cyan); font-size:16px; }
      .photo-btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
      .photo-btns button { padding:18px 8px; font-size:clamp(15px,4.5vw,18px); border-radius:14px; border:1px solid var(--cyan); background:rgba(31,214,232,.1); color:#fff; }
      #preview { width:100%; max-height:42vh; object-fit:contain; border-radius:14px; margin-top:12px; background:#000; }
      .send { width:100%; padding:16px; margin-top:12px; font-size:18px; font-weight:600; border-radius:14px; border:none; background:var(--cyan); color:#06121a; }
      .send:disabled { opacity:.4; }
      .err { color:var(--err); text-align:center; margin-top:8px; }
      .ok { color:var(--ok); text-align:center; margin-top:8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>FUROR LIVE</h1>
      <div id="evt" class="muted"></div>

      <div id="vote" class="card"></div>

      <div class="card">
        <p class="title">📸 Envía tu foto</p>
        <input id="alias" type="text" placeholder="Tu nombre (opcional)" maxlength="40" />
        <div class="photo-btns">
          <button id="btnCam">📷 Cámara</button>
          <button id="btnGal">🖼 Galería</button>
        </div>
        <input id="fileCam" type="file" accept="image/*" capture="environment" style="display:none" />
        <input id="fileGal" type="file" accept="image/*" style="display:none" />
        <img id="preview" alt="" style="display:none" />
        <button id="sendPhoto" class="send" disabled>Enviar foto</button>
        <p id="photoMsg"></p>
      </div>
    </div>

    <script>
      var qs = new URLSearchParams(location.search)
      var code = qs.get('k') || ''
      var voterId = localStorage.getItem('furor_voter_id')
      if (!voterId) { voterId = 'v_' + Date.now() + '_' + Math.floor(Math.random() * 1e6); localStorage.setItem('furor_voter_id', voterId) }
      var $ = function (id) { return document.getElementById(id) }
      var voted = false, lastSig = '', cur = null, showResults = false

      function renderResults(vote, kind) {
        var t = vote.tallies || {}
        if (kind === 'energy') return '<p class="thanks">⚡ ' + (t.energy || 0) + '</p>'
        var entries
        if (kind === 'score') entries = [1, 2, 3, 4, 5].map(function (n) { return { label: '★ ' + n, c: t[String(n)] || 0 } })
        else if (kind === 'question') entries = (vote.options || []).map(function (o, i) { return { label: o.label, c: t[String(i)] || 0 } })
        else entries = (vote.options || []).map(function (o) { return { label: o.label, c: t[o.key] || 0 } })
        var total = entries.reduce(function (a, e) { return a + e.c }, 0)
        return entries.map(function (e) {
          var pct = total > 0 ? Math.round(e.c / total * 100) : 0
          return '<div style="text-align:left;margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:16px"><span>' + e.label + '</span><span style="color:var(--cyan)">' + pct + '% (' + e.c + ')</span></div><div style="height:16px;border-radius:8px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:4px"><div style="height:100%;width:' + pct + '%;background:var(--violet);transition:width .3s"></div></div></div>'
        }).join('') + '<p class="muted" style="margin-top:10px">' + total + ' votos</p>'
      }

      function post(path, body) {
        return fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          .then(function (r) { if (!r.ok) return r.json().catch(function () { return {} }).then(function (j) { throw new Error(j.error || ('Error ' + r.status)) }) })
      }
      function cast(value) {
        post('/api/vote', { voterId: voterId, value: value, code: code })
          .then(function () { voted = true; render() })
          .catch(function (e) { $('vote').insertAdjacentHTML('beforeend', '<p class="err">' + e.message + '</p>') })
      }

      function render() {
        var vote = cur && cur.vote
        var open = !!(vote && vote.open)
        $('evt').innerHTML = (cur && cur.eventName ? cur.eventName + ' · ' : '') + (cur && cur.connected ? '<span class="badge on">en directo</span>' : '<span class="badge off">sin conexión</span>')
        var box = $('vote')
        if (!open) { box.innerHTML = '<p class="muted title">Esperando votación…</p>'; showResults = false; return }
        var kind = vote.kind || 'question'
        var title = vote.title ? '<p class="title">' + vote.title + '</p>' : ''
        var resBtn = '<button class="opt" id="toggleRes" style="border-color:var(--cyan);background:rgba(31,214,232,.12)">' + (showResults ? '⬅ Volver a votar' : '📊 Ver puntuación en directo') + '</button>'
        // Vista de resultados en tiempo real.
        if (showResults) {
          box.innerHTML = title + renderResults(vote, kind) + resBtn
          $('toggleRes').onclick = function () { showResults = false; render() }
          return
        }
        if (kind === 'energy') {
          box.innerHTML = title + '<button class="energy" id="en">¡Energía!</button>' + resBtn
          $('en').onclick = function () { post('/api/vote', { voterId: voterId, value: 0, code: code }).catch(function () {}) }
          $('toggleRes').onclick = function () { showResults = true; render() }
          return
        }
        var inner
        if (voted) inner = '<p class="thanks">¡Gracias por tu voto!</p>'
        else {
          var opts = []
          if (kind === 'score') opts = [1, 2, 3, 4, 5].map(function (n) { return { value: n, label: String(n) } })
          else if (kind === 'question') opts = (vote.options || []).map(function (o, i) { return { value: i, label: o.label } })
          else opts = (vote.options || []).map(function (o) { return { value: Number(o.key), label: o.label } })
          inner = kind === 'score'
            ? '<div class="scores">' + opts.map(function (o) { return '<button data-v="' + o.value + '">' + o.label + '</button>' }).join('') + '</div>'
            : opts.map(function (o) { return '<button class="opt" data-v="' + o.value + '">' + o.label + '</button>' }).join('')
        }
        box.innerHTML = title + inner + resBtn
        Array.prototype.forEach.call(box.querySelectorAll('button[data-v]'), function (b) { b.onclick = function () { cast(Number(b.dataset.v)) } })
        $('toggleRes').onclick = function () { showResults = true; render() }
      }

      function poll() {
        fetch('/api/state').then(function (r) { return r.json() }).then(function (d) {
          cur = d
          var sig = JSON.stringify(d && d.vote ? [d.vote.kind, d.vote.open, d.vote.title, d.vote.options] : null)
          if (sig !== lastSig) { lastSig = sig; if (d && d.vote && d.vote.open) voted = false }
          render()
        }).catch(function () {})
      }
      poll(); setInterval(poll, 2500)

      // --- Foto: elegir cámara o galería, reducir en el móvil y enviar ---
      var photoData = null
      $('btnCam').onclick = function () { $('fileCam').click() }
      $('btnGal').onclick = function () { $('fileGal').click() }
      function handleFile(e) {
        $('photoMsg').textContent = ''
        var file = e.target.files && e.target.files[0]
        if (!file) return
        var reader = new FileReader()
        reader.onload = function () {
          var img = new Image()
          img.onload = function () {
            var MAX = 1280, w = img.width, h = img.height
            if (w > MAX || h > MAX) { var s = MAX / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s) }
            var c = document.createElement('canvas'); c.width = w; c.height = h
            c.getContext('2d').drawImage(img, 0, 0, w, h)
            photoData = c.toDataURL('image/jpeg', 0.8)
            var p = $('preview'); p.src = photoData; p.style.display = 'block'
            $('sendPhoto').disabled = false
          }
          img.onerror = function () { $('photoMsg').innerHTML = '<span class="err">No se pudo leer la imagen.</span>' }
          img.src = reader.result
        }
        reader.onerror = function () { $('photoMsg').innerHTML = '<span class="err">No se pudo leer la imagen.</span>' }
        reader.readAsDataURL(file)
      }
      $('fileCam').onchange = handleFile
      $('fileGal').onchange = handleFile
      $('sendPhoto').onclick = function () {
        if (!photoData) return
        $('sendPhoto').disabled = true
        $('photoMsg').textContent = 'Enviando…'
        post('/api/photo', { alias: $('alias').value.trim() || undefined, dataUrl: photoData, code: code })
          .then(function () {
            $('photoMsg').innerHTML = '<span class="ok">¡Foto enviada! La revisará la organización.</span>'
            photoData = null; $('preview').style.display = 'none'; $('fileCam').value = ''; $('fileGal').value = ''
          })
          .catch(function (e) { $('photoMsg').innerHTML = '<span class="err">' + e.message + '</span>'; $('sendPhoto').disabled = false })
      }
    </script>
  </body>
</html>
